<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>女巫的毒药</title>

<!-- ✅ PWA支持 -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="毒药游戏">

<style>
* { box-sizing: border-box; user-select: none; }

body {
    margin:0;
    font-family: system-ui;
    background:#1a2a1f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    touch-action: manipulation;
}

.game-container {
    width:100%;
    max-width:900px;
    background:#2a3524;
    border-radius:20px;
    padding:20px;
}

h1 { text-align:center; color:#fff; }

.word-grid {
    display:grid;
    grid-template-columns: repeat(6,1fr);
    gap:10px;
    margin-top:20px;
}

.card {
    padding:12px;
    border-radius:12px;
    background:#3a4a2e;
    color:#fff;
    font-weight:bold;
    border:none;
    cursor:pointer;
    touch-action: manipulation;
}

.card.clicked {
    opacity:0.5;
    text-decoration: line-through;
}

.message {
    margin-top:15px;
    background:#111;
    padding:10px;
    border-radius:10px;
    color:#fff;
}
</style>
</head>

<body>

<div class="game-container">
<h1>🧙 女巫的毒药</h1>

<div id="grid" class="word-grid"></div>

<div id="msg" class="message">
点击单词开始游戏（会自动朗读🔊）
</div>

<button onclick="resetGame()">🔄 重开</button>
</div>

<script>
// ===== 单词库 =====
const WORDS = [
"apple","banana","school","teacher","doctor","happy","sad",
"music","water","food","book","pen","desk","chair",
"run","walk","jump","swim","read","write","speak",
"big","small","fast","slow","hot","cold",
"dog","cat","bird","fish","tree","flower",
"sun","moon","star","sky"
];

// ===== 语音函数（核心🔥）=====
function speak(word){
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = "en-US";
    utter.rate = 0.9;
    speechSynthesis.speak(utter);
}

// ===== 游戏状态 =====
let words = [];
let clicked = [];
let poison = null;

// ===== 初始化 =====
function init(){
    words = shuffle([...WORDS]).slice(0,36);
    clicked = Array(36).fill(false);
    poison = Math.floor(Math.random()*36);

    render();
}

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

// ===== 渲染 =====
function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML="";

    words.forEach((w,i)=>{
        const btn = document.createElement("button"); // ✅ iPad优化
        btn.className="card";
        if(clicked[i]) btn.classList.add("clicked");

        btn.innerText=w;

        btn.onclick=()=>handleClick(i);

        grid.appendChild(btn);
    });
}

// ===== 点击 =====
function handleClick(i){

    if(clicked[i]) return;

    clicked[i]=true;

    const word = words[i];

    // 🔊 朗读
    speak(word);

    // 📳 震动
    navigator.vibrate?.(30);

    if(i===poison){
        document.getElementById("msg").innerHTML=
        "💀 中毒了！单词："+word;
    }else{
        document.getElementById("msg").innerHTML=
        "安全！单词："+word;
    }

    render();
}

// ===== 重开 =====
function resetGame(){
    init();
}

// ===== 启动 =====
init();


</script>

</body>
</html>
